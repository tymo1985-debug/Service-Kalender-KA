<script id="wk-popup-restored-final">
(function(){
  if(window.__wkPopupRestoredFinal) return;
  window.__wkPopupRestoredFinal = true;

  function esc(s){
    return String(s ?? '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }
  function getYear(){ const el = document.getElementById('yearSelect'); return el ? el.value : ''; }
  function getMeetings(){ try{ return JSON.parse(localStorage.getItem('svc_m') || '[]'); }catch(e){ return window.meetings || []; } }
  function syncMeetings(){ try{ window.meetings = getMeetings(); }catch(e){} return window.meetings || []; }
  function getYearData(y){ try{ return JSON.parse(localStorage.getItem('svc_d_' + y) || '[]'); }catch(e){ return []; } }
  function setYearData(y, arr){ try{ localStorage.setItem('svc_d_' + y, JSON.stringify(arr)); }catch(e){} }
  function parseDate(v){ return typeof parseYmdLocal === 'function' ? parseYmdLocal(v) : null; }
  function dateVal(dt){
    if(!dt || isNaN(dt.getTime())) return '';
    const off = dt.getTimezoneOffset() * 60000;
    return new Date(dt.getTime() - off).toISOString().slice(0,10);
  }
  function nearestSunday(startDt){
    const e = new Date(startDt);
    const dow = startDt.getDay() || 7;
    e.setDate(startDt.getDate() + (7 - dow));
    e.setHours(0,0,0,0);
    return e;
  }
  function weekSpan(week, year){
    const startMonday = getStartMondayForYear(parseInt(year,10));
    const d0 = new Date(startMonday);
    d0.setDate(startMonday.getDate() + (week - 1) * 7);
    d0.setHours(0,0,0,0);
    const d6 = new Date(d0);
    d6.setDate(d0.getDate() + 6);
    d6.setHours(0,0,0,0);
    return { start:d0, end:d6 };
  }
  function popupLabel(kind){
    const L = (window.i18n && i18n.locale) ? i18n.locale : 'ru';
    const labels = {
      event:  L==='en'?'Event':(L==='uk'?'Подія':(L==='pl'?'Wydarzenie':'Событие')),
      assign: L==='en'?'Assign':(L==='uk'?'Призначити':(L==='pl'?'Przypisz':'Назначить')),
      range:  L==='en'?'Range':(L==='uk'?'Діапазон':(L==='pl'?'Zakres':'Диапазон')),
      sched:  L==='en'?'Schedule':(L==='uk'?'Розклад':(L==='pl'?'Harmonogram':'Расписание')),
      addr:   L==='en'?'Address':(L==='uk'?'Адреса':(L==='pl'?'Adres':'Адрес')),
      week:   (window.i18n && i18n.t) ? i18n.t('week') : 'Неделя',
      note:   L==='en'?'Week note':(L==='uk'?'Нотатка тижня':(L==='pl'?'Notatka tygodnia':'Заметка недели')),
      save:   L==='en'?'Save':(L==='uk'?'Зберегти':(L==='pl'?'Zapisz':'Сохранить')),
      clear:  L==='en'?'Clear':(L==='uk'?'Очистити':(L==='pl'?'Wyczyść':'Очистить')),
      close:  L==='en'?'Close':(L==='uk'?'Закрити':(L==='pl'?'Zamknij':'Закрыть')),
      none:   L==='en'?'— no event —':(L==='uk'?'— немає події —':(L==='pl'?'— brak wydarzenia —':'— нет события —')),
      start:  L==='en'?'Start':(L==='uk'?'Початок':(L==='pl'?'Początek':'Начало')),
      end:    L==='en'?'End':(L==='uk'?'Кінець':(L==='pl'?'Koniec':'Конец')),
      fixEnd: L==='en'?'End date adjusted to match start date.':(L==='uk'?'Дату завершення виправлено до дати початку.':(L==='pl'?'Data końcowa została poprawiona do daty początkowej.':'Дата окончания исправлена до даты начала.'))
    };
    return labels[kind] || kind;
  }

  let popup = null;
  let ctx = { year:null, week:null };

  function removeOldPopups(){
    ['weekInfoOverlay','weekInfoOverlayStable','weekInfoOverlayFixed'].forEach(id => {
      const el = document.getElementById(id);
      if(el) el.remove();
    });
    ['weekInfoModalStyle','weekInfoModalStyleStable','weekInfoModalStyleFixed'].forEach(id => {
      const el = document.getElementById(id);
      if(el) el.remove();
    });
  }

  function ensurePopup(){
    if(popup && popup.ov && popup.modal) return popup;
    removeOldPopups();

    const style = document.createElement('style');
    style.id = 'weekInfoModalStyleFixed';
    style.textContent = `
      #weekInfoOverlayFixed{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.35);z-index:16000;}
      #weekInfoModalFixed{width:min(94vw,560px);background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.25);}
      #weekInfoModalFixed header{background:var(--primary);color:#fff;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;}
      #weekInfoModalFixed .body{padding:12px;display:flex;flex-direction:column;gap:10px;font-size:14px;}
      #weekInfoModalFixed .row{display:flex;gap:8px;align-items:flex-start;}
      #weekInfoModalFixed .cap{min-width:120px;color:#607d8b;padding-top:6px;}
      #weekInfoModalFixed .grow{flex:1;min-width:0;}
      #weekInfoModalFixed .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;color:#fff;font-weight:700;}
      #weekInfoModalFixed .addr{color:#607d8b;font-size:13px;}
      #weekInfoModalFixed .foot{display:flex;justify-content:flex-end;gap:8px;padding:10px 12px;border-top:1px solid #eee;flex-wrap:wrap;}
      #wkEventPickWrapFixed,#wkDateWrapFixed{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
      #wkPickSelFixed{min-width:240px;max-width:100%;}
      #wkStartDateFixed,#wkEndDateFixed{width:auto;min-width:152px;}
      #wkApplyFixed{background:var(--primary);} #wkClearFixed{background:#9e9e9e;} #weekInfoCloseFixed{background:#78909c;} #weekInfoNoteFixed{background:var(--primary);}
      @media (max-width:560px){
        #weekInfoModalFixed .row{flex-direction:column;}
        #weekInfoModalFixed .cap{min-width:0;padding-top:0;}
        #wkPickSelFixed,#wkStartDateFixed,#wkEndDateFixed{width:100%;min-width:0;}
      }
    `;
    document.head.appendChild(style);

    const ov = document.createElement('div');
    ov.id = 'weekInfoOverlayFixed';
    const modal = document.createElement('div');
    modal.id = 'weekInfoModalFixed';
    modal.innerHTML = `
      <header>
        <div id="wkInfoTitleFixed">—</div>
        <button id="weekInfoCloseFixed" class="btn" type="button">×</button>
      </header>
      <div class="body">
        <div class="row"><div class="cap" id="wkCapEventFixed"></div><div class="grow" id="wkEventFixed">—</div></div>
        <div class="row"><div class="cap" id="wkCapAssignFixed"></div><div class="grow" id="wkEventPickWrapFixed"><select id="wkPickSelFixed"></select><button id="wkClearFixed" class="btn" type="button"></button></div></div>
        <div class="row"><div class="cap" id="wkCapRangeFixed"></div><div class="grow" id="wkDateWrapFixed"><input id="wkStartDateFixed" type="date"><input id="wkEndDateFixed" type="date"></div></div>
        <div class="row" id="wkSchedRowFixed" style="display:none"><div class="cap" id="wkCapSchedFixed"></div><div class="grow" id="wkSchedFixed"></div></div>
        <div class="row" id="wkAddrRowFixed" style="display:none"><div class="cap" id="wkCapAddrFixed"></div><div class="grow addr" id="wkAddrFixed"></div></div>
      </div>
      <div class="foot">
        <button id="weekInfoNoteFixed" class="btn" type="button"></button>
        <button id="wkApplyFixed" class="btn" type="button"></button>
        <button id="weekInfoCancelFixed" class="btn" type="button"></button>
      </div>
    `;
    ov.appendChild(modal);
    document.body.appendChild(ov);
    popup = { ov, modal };

    function closePopup(){ popup.ov.style.display = 'none'; }
    modal.querySelector('#weekInfoCloseFixed').addEventListener('click', closePopup);
    modal.querySelector('#weekInfoCancelFixed').addEventListener('click', closePopup);
    ov.addEventListener('click', (e) => { if(e.target === ov) closePopup(); });
    document.addEventListener('keydown', (e) => { if(e.key === 'Escape' && popup.ov.style.display === 'flex') closePopup(); });
    window.__wkPopupCloseFixed = closePopup;
    applyLabels();
    return popup;
  }

  function applyLabels(){
    ensurePopup();
    const m = popup.modal;
    m.querySelector('#wkCapEventFixed').textContent = popupLabel('event');
    m.querySelector('#wkCapAssignFixed').textContent = popupLabel('assign');
    m.querySelector('#wkCapRangeFixed').textContent = popupLabel('range');
    m.querySelector('#wkCapSchedFixed').textContent = popupLabel('sched');
    m.querySelector('#wkCapAddrFixed').textContent = popupLabel('addr');
    m.querySelector('#weekInfoNoteFixed').textContent = '✎ ' + popupLabel('note');
    m.querySelector('#wkApplyFixed').textContent = popupLabel('save');
    m.querySelector('#wkClearFixed').textContent = popupLabel('clear');
    m.querySelector('#weekInfoCancelFixed').textContent = popupLabel('close');
    m.querySelector('#wkStartDateFixed').title = popupLabel('start');
    m.querySelector('#wkEndDateFixed').title = popupLabel('end');
  }

  function updateEventPreview(name){
    const m = popup.modal;
    const evEl = m.querySelector('#wkEventFixed');
    const schedRow = m.querySelector('#wkSchedRowFixed');
    const addrRow = m.querySelector('#wkAddrRowFixed');
    const info = name ? syncMeetings().find(x => x.name === name) : null;

    if(name && info){
      evEl.innerHTML = `<span class="pill" style="background:${info.color}">${esc(name)}</span>`;
    } else if(name && !info){
      evEl.innerHTML = `<span class="pill" style="background:#cfd8dc;color:#263238">${esc(name)}</span>`;
    } else {
      evEl.textContent = popupLabel('none');
    }

    const sched = [];
    if(info && (info.wd || info.tWD)) sched.push(`${info.wd || ''} ${info.tWD || ''}`.trim());
    if(info && (info.we || info.tWE)) sched.push(`${info.we || ''} ${info.tWE || ''}`.trim());
    m.querySelector('#wkSchedFixed').textContent = sched.join(' • ');
    schedRow.style.display = sched.length ? '' : 'none';

    m.querySelector('#wkAddrFixed').textContent = info && info.addr ? info.addr : '';
    addrRow.style.display = info && info.addr ? '' : 'none';
  }

  function openWeekInfo(week){
    ensurePopup();
    applyLabels();
    const year = getYear();
    ctx = { year, week };
    const row = getYearData(year).find(r => r.id == week) || { id:week, s:'', e:'', m:'', nt:'' };
    const span = weekSpan(week, year);
    const m = popup.modal;
    const meetings = syncMeetings();

    m.querySelector('#wkInfoTitleFixed').textContent = `${popupLabel('week')} №${week}`;
    m.querySelector('#wkStartDateFixed').value = row.s || dateVal(span.start);
    m.querySelector('#wkEndDateFixed').value = row.e || dateVal(span.end);

    const sel = m.querySelector('#wkPickSelFixed');
    sel.innerHTML = [`<option value="">${esc(popupLabel('none'))}</option>`].concat(meetings.map(x => `<option value="${esc(x.name)}">${esc(x.name)}</option>`)).join('');
    sel.value = row.m || '';
    updateEventPreview(row.m || '');

    sel.onchange = () => updateEventPreview(sel.value || '');
    m.querySelector('#wkClearFixed').onclick = () => { sel.value = ''; updateEventPreview(''); };
    m.querySelector('#wkStartDateFixed').onchange = () => {
      const s = parseDate(m.querySelector('#wkStartDateFixed').value);
      const e = parseDate(m.querySelector('#wkEndDateFixed').value);
      if(s && (!e || e.getTime() < s.getTime())) m.querySelector('#wkEndDateFixed').value = dateVal(nearestSunday(s));
    };
    m.querySelector('#weekInfoNoteFixed').onclick = () => {
      try{ if(typeof openNoteEditor === 'function') openNoteEditor(week); }catch(e){}
      if(window.__wkPopupCloseFixed) window.__wkPopupCloseFixed();
    };
    m.querySelector('#wkApplyFixed').onclick = () => {
      const rows = getYearData(year);
      const idx = rows.findIndex(r => r.id == week);
      const prev = idx >= 0 ? rows[idx] : { id:week, s:'', e:'', m:'', nt:'' };
      let s = parseDate(m.querySelector('#wkStartDateFixed').value);
      let e = parseDate(m.querySelector('#wkEndDateFixed').value);
      if(s && !e) e = nearestSunday(s);
      if(s && e && e.getTime() < s.getTime()){
        e = new Date(s);
        m.querySelector('#wkEndDateFixed').value = dateVal(e);
        if(typeof showToast === 'function') showToast(popupLabel('fixEnd'));
      }
      const next = Object.assign({}, prev, {
        id: week,
        s: s ? dateVal(s) : '',
        e: e ? dateVal(e) : '',
        m: sel.value || '',
        ts: Date.now()
      });
      if(idx >= 0) rows[idx] = next; else rows.push(next);
      setYearData(year, rows);
      if(window.__wkPopupCloseFixed) window.__wkPopupCloseFixed();
      if(typeof window.renderAll === 'function') window.renderAll();
      setTimeout(() => {
        try{
          const calRow = document.getElementById('wk-' + week);
          const anchor = calRow && calRow.querySelector ? (calRow.querySelector('.week-cell') || calRow) : calRow;
          if(anchor && anchor.scrollIntoView) anchor.scrollIntoView({ behavior:'smooth', block:'center' });
          if(typeof window.focusLeftRow === 'function') window.focusLeftRow(week);
        }catch(e){}
      }, 60);
    };

    popup.ov.style.display = 'flex';
  }
  window.openWeekInfo = openWeekInfo;

  function scrollToWeek(weekNo){
    let row = document.getElementById('wk-' + weekNo);
    if(!row && typeof window.buildCal === 'function'){
      window.buildCal();
      row = document.getElementById('wk-' + weekNo);
    }
    const anchor = row && row.querySelector ? (row.querySelector('.week-cell') || row) : row;
    if(anchor && anchor.scrollIntoView) anchor.scrollIntoView({ behavior:'smooth', block:'center' });
    if(row && typeof window.highlightWeek === 'function'){
      try{ window.highlightWeek(row); }catch(e){}
    }
    if(typeof window.focusLeftRow === 'function'){
      try{ window.focusLeftRow(weekNo); }catch(e){}
    }
  }

  // Robust override for all programmatic navigations.
  window.goToWeek = function(weekNo, skipPopup){
    currentFocusWeek = weekNo;
    scrollToWeek(weekNo);
    if(!skipPopup){
      setTimeout(() => {
        try{ openWeekInfo(weekNo); }catch(e){ console.error('[wk-popup-restored-final] open failed', e); }
      }, 80);
    }
  };

  function bindLeftWeekClicks(){
    const panel = document.getElementById('left-panel');
    if(!panel || panel.dataset.wkPopupRestoredLeft === '1') return;
    panel.dataset.wkPopupRestoredLeft = '1';
    panel.addEventListener('click', (e) => {
      const btn = e.target.closest('.linklike');
      if(!btn) return;
      const wk = parseInt((btn.textContent || '').trim(), 10);
      if(!wk) return;
      e.preventDefault();
      e.stopPropagation();
      if(typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
      window.goToWeek(wk);
    }, true);
  }

  function bindCalendarWeekClicks(){
    const area = document.getElementById('calendarArea');
    if(!area || area.dataset.wkPopupRestoredCal === '1') return;
    area.dataset.wkPopupRestoredCal = '1';
    area.addEventListener('click', (e) => {
      const cell = e.target.closest('[data-week-click]');
      if(!cell) return;
      const wk = parseInt(cell.getAttribute('data-week-click') || '0', 10);
      if(!wk) return;
      e.preventDefault();
      e.stopPropagation();
      if(typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
      scrollToWeek(wk);
      openWeekInfo(wk);
    }, true);
  }

  function refreshBindings(){
    bindLeftWeekClicks();
    bindCalendarWeekClicks();
    applyLabels();
  }

  // Re-bind after re-renders and locale changes without depending on older popup layers.
  if(window.wrapOnceGlobal){
    wrapOnceGlobal('renderAll', (orig) => function(){ const r = orig.apply(this, arguments); setTimeout(refreshBindings, 0); return r; });
    wrapOnceGlobal('buildCal', (orig) => function(){ const r = orig.apply(this, arguments); setTimeout(bindCalendarWeekClicks, 0); return r; });
    wrapOnceGlobal('applyI18nStatic', (orig) => function(){ const r = orig.apply(this, arguments); setTimeout(applyLabels, 0); return r; });
  }

  window.addEventListener('load', () => {
    syncMeetings();
    ensurePopup();
    refreshBindings();
  });
})();
</script>
